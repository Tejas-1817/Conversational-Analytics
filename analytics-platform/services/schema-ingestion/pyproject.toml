[tool.ruff]
line-length = 120  # SQLAlchemy declarative models and test assertions read better wide
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "S"]  # incl. flake8-bandit security checks
ignore = [
  "S101",  # assert allowed (tests, invariant checks)
  "B008",   # FastAPI canonical `Depends(...)` in parameter defaults
  "UP017",  # keep timezone.utc: devs may run tests on Python <3.11
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S105", "S106"]  # hardcoded test passwords are fine in tests

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = ["integration: requires docker compose stack"]
addopts = "-q"

[tool.coverage.run]
omit = ["app/worker.py"]
