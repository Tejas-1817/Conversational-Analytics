services:
  metadata-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ingestion
      POSTGRES_PASSWORD: ingestion
      POSTGRES_DB: metadata
    ports:
      - "5442:5432"   # non-default host port to avoid clashing with a local Postgres
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d:ro   # runs 001_init.sql on first start
      - metadata_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6380:6379"   # non-default host port to avoid clashing with a local Redis

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      METADATA_DB_URL: postgresql+psycopg://ingestion:ingestion@metadata-db:5432/metadata
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8000"   # host port 8080 (8000 was taken on this machine); container still listens on 8000
    depends_on:
      - metadata-db
      - redis

  worker:
    build: .
    command: python -m app.worker
    env_file: .env
    environment:
      METADATA_DB_URL: postgresql+psycopg://ingestion:ingestion@metadata-db:5432/metadata
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - metadata-db
      - redis

  # Demo customer database to ingest during development (optional)
  demo-source-db:
    image: postgres:16
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: shop
    ports:
      - "5443:5432"
    volumes:
      - ./demo/demo_shop.sql:/docker-entrypoint-initdb.d/demo_shop.sql:ro

volumes:
  metadata_data:
